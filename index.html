<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
    window._mediaRecorder = null;
    window._audioChunks = [];

    function mtaSignal(event, data) {
        // Navega para URL especial que o Lua vai interceptar
        window.location.href = 'http://mta-signal/' + event + '?' + encodeURIComponent(data || '');
    }

    function startRecording(uploadUrl) {
        navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
            window._mediaRecorder = new MediaRecorder(stream);
            window._audioChunks = [];
            window._mediaRecorder.ondataavailable = function(e) {
                if (e.data.size > 0) window._audioChunks.push(e.data);
            };
            window._mediaRecorder.onstop = async function() {
                const blob = new Blob(window._audioChunks, { type: 'audio/webm' });
                const fd = new FormData();
                fd.append('voice', blob, 'voice_message.webm');
                try {
                    const res = await fetch(uploadUrl, { method: 'POST', body: fd });
                    if (res.ok) {
                        const data = await res.json();
                        mtaSignal('onAudioUploadSuccess', data.url);
                    } else {
                        mtaSignal('onAudioUploadError', 'Upload falhou: ' + res.statusText);
                    }
                } catch(err) {
                    mtaSignal('onAudioUploadError', 'Erro: ' + err.message);
                }
            };
            window._mediaRecorder.start();
            mtaSignal('onAudioStatusUpdate', 'Gravando...');
        }).catch(function(e) {
            mtaSignal('onAudioUploadError', 'Permissão negada: ' + e.message);
        });
    }

    function stopRecording() {
        if (window._mediaRecorder && window._mediaRecorder.state === 'recording') {
            window._mediaRecorder.stop();
            mtaSignal('onAudioStatusUpdate', 'Enviando...');
        }
    }

    function processHash() {
        var hash = window.location.hash.substring(1);
        if (hash.startsWith('start:')) {
            startRecording(decodeURIComponent(hash.substring(6)));
        } else if (hash === 'stop') {
            stopRecording();
        } else {
            mtaSignal('onAudioRecorderReady', '');
        }
    }

    function waitMtaSignalReady() {
        // mta nao existe em browser remoto, mas mtaSignal usa navegacao
        // entao pode chamar direto
        processHash();
    }

    window.addEventListener('load', waitMtaSignalReady);
    window.addEventListener('hashchange', processHash);
</script>
</body>
</html>
