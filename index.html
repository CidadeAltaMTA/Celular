<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
    window._mediaRecorder = null;
    window._audioChunks = [];

    function startRecording(uploadUrl) {
        console.log('[AUDIO] startRecording: ' + uploadUrl);
        navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
            console.log('[AUDIO] getUserMedia OK');
            window._mediaRecorder = new MediaRecorder(stream);
            window._audioChunks = [];
            window._mediaRecorder.ondataavailable = function(e) {
                if (e.data.size > 0) window._audioChunks.push(e.data);
            };
            window._mediaRecorder.onstop = async function() {
                console.log('[AUDIO] onstop - enviando...');
                const blob = new Blob(window._audioChunks, { type: 'audio/webm' });
                const fd = new FormData();
                fd.append('voice', blob, 'voice_message.webm');
                try {
                    const res = await fetch(uploadUrl, { method: 'POST', body: fd });
                    if (res.ok) {
                        const data = await res.json();
                        console.log('[AUDIO] upload ok: ' + data.url);
                        mta.triggerEvent('onAudioUploadSuccess', data.url);
                    } else {
                        mta.triggerEvent('onAudioUploadError', 'Upload falhou: ' + res.statusText);
                    }
                } catch(err) {
                    mta.triggerEvent('onAudioUploadError', 'Erro: ' + err.message);
                }
            };
            window._mediaRecorder.start();
            console.log('[AUDIO] gravando...');
            mta.triggerEvent('onAudioStatusUpdate', 'Gravando...');
        }).catch(function(e) {
            console.log('[AUDIO] erro: ' + e.message);
            mta.triggerEvent('onAudioUploadError', 'Erro: ' + e.message);
        });
    }

    function stopRecording() {
        console.log('[AUDIO] stopRecording, state: ' + (window._mediaRecorder ? window._mediaRecorder.state : 'null'));
        if (window._mediaRecorder && window._mediaRecorder.state === 'recording') {
            window._mediaRecorder.stop();
            mta.triggerEvent('onAudioStatusUpdate', 'Enviando...');
        }
    }

    function processHash() {
        var hash = window.location.hash.substring(1);
        console.log('[AUDIO] processHash: ' + hash);
        if (hash.startsWith('start:')) {
            startRecording(decodeURIComponent(hash.substring(6)));
        } else if (hash === 'stop') {
            stopRecording();
        } else {
            // Sem hash = primeira carga, sinaliza pronto
            mta.triggerEvent('onAudioRecorderReady');
            console.log('[AUDIO] pronto');
        }
    }

    // Espera mta estar disponível ANTES de qualquer ação
    function waitMtaThenProcess() {
        if (window.mta && window.mta.triggerEvent) {
            processHash();
        } else {
            setTimeout(waitMtaThenProcess, 100);
        }
    }

    window.addEventListener('load', function() {
        console.log('[AUDIO] page loaded, hash: "' + window.location.hash + '"');
        waitMtaThenProcess();
    });

    window.addEventListener('hashchange', function() {
        console.log('[AUDIO] hashchange: ' + window.location.hash);
        processHash();
    });
</script>
</body>
</html>
