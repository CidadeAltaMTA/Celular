<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
    var chunks = [];
    var recorder = null;

    window.addEventListener("message", function(e) {
        if (e.data === "start") startRec();
        else if (e.data === "stop") stopRec();
        else if (e.data && e.data.type === "play") playAudio(e.data.base64);
    });

    function send(type, payload) {
        window.parent.postMessage({ type: 'audio_data', base64: payload }, "*");
    }

    function startRec() {
        if (!navigator.mediaDevices) { send("error", "no mediaDevices"); return; }
        chunks = [];
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(function(stream) {
                recorder = new MediaRecorder(stream);
                recorder.ondataavailable = function(e) {
                    if (e.data && e.data.size > 0) chunks.push(e.data);
                };
                recorder.onstop = function() {
                    var blob = new Blob(chunks, { type: "audio/webm" });
                    var reader = new FileReader();
                    reader.onloadend = function() {
                        send("voice_data", reader.result.split(",")[1]);
                    };
                    reader.readAsDataURL(blob);
                    stream.getTracks().forEach(function(t) { t.stop(); });
                };
                recorder.start();
                send("debug", "recording_started");
            })
            .catch(function(err) { send("error", err.message); });
    }

    function stopRec() {
        if (recorder && recorder.state !== "inactive") recorder.stop();
    }

    function playAudio(base64) {
        new Audio("data:audio/webm;base64," + base64).play();
    }
</script>
</body>
</html>
