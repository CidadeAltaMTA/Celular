<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
    var chunks = [];
    var recorder = null;

    window.addEventListener("message", function(e) {
        if (e.data === "start") startRec();
        else if (e.data === "stop") stopRec();
        else if (e.data && e.data.type === "play") playAudio(e.data.base64);
    });

    function sendToBridge(status, data) {
        window.parent.postMessage({ type: 'from_github', status: status, value: data }, "*");
    }

    function startRec() {
        if (!navigator.mediaDevices) { 
            sendToBridge("error", "Navegador não suporta mediaDevices"); 
            return; 
        }

        chunks = [];
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(function(stream) {
                recorder = new MediaRecorder(stream, { audioBitsPerSecond: 32000 });
                
                recorder.ondataavailable = function(e) {
                    if (e.data && e.data.size > 0) chunks.push(e.data);
                };

                recorder.onstop = function() {
                    var blob = new Blob(chunks, { type: "audio/webm" });
                    var reader = new FileReader();
                    reader.onloadend = function() {
                        sendToBridge("data", reader.result.split(",")[1]);
                    };
                    reader.readAsDataURL(blob);
                    stream.getTracks().forEach(function(t) { t.stop(); });
                };

                recorder.start();
                sendToBridge("debug", "recording_started");
            })
            .catch(function(err) { 
                sendToBridge("error", err.message); 
            });
    }

    function stopRec() {
        if (recorder && recorder.state !== "inactive") recorder.stop();
    }

    function playAudio(base64) {
        var audio = new Audio("data:audio/webm;base64," + base64);
        audio.play().catch(function(e){
            sendToBridge("error", "Erro ao dar play: " + e.message);
        });
    }
</script>
</body>
</html>
